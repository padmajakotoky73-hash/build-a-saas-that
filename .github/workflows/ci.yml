```yaml
name: Build-a-SaaS CI/CD Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    - name: Run FastAPI tests
      run: |
        pytest --cov=fastapi tests/
    - name: Run Next.js tests
      run: |
        npm install
        npm run test

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@v1
      with:
        image: 'ubuntu-latest'
    - name: Run Snyk scan
      uses: snyk/scan@v1
      with:
        image: 'ubuntu-latest'

  deploy:
    needs: [ test, security-scan ]
    runs-on: railway-app
    steps:
    - name: Deploy backend
      uses: railwayapp/deploy@v1
      with:
        project-id: ${{ secrets.RAILWAY_PROJECT_ID }}
        token: ${{ secrets.RAILWAY_TOKEN }}
    - name: Deploy frontend
      uses: vercel/deploy@v1
      with:
        project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        token: ${{ secrets.VERCEL_TOKEN }}

  migration:
    needs: [ deploy ]
    runs-on: ubuntu-latest
    steps:
    - name: Run Alembic migrations
      uses: alembic/alembic-action@v1
      with:
        image: 'ubuntu-latest'

  docs:
    needs: [ deploy ]
    runs-on: ubuntu-latest
    steps:
    - name: Generate OpenAPI docs
      uses: swagger-api/swagger-ui@v1
      with:
        image: 'ubuntu-latest'
    - name: Update docs
      run: |
        npm install
        npm run docs
