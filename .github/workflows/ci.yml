```

This pipeline includes:
- pytest for FastAPI backend testing
- vitest for Next.js frontend testing
- Trivy container vulnerability scanning
- Snyk dependency security scanning
- OWASP ZAP baseline security scanning
- Alembic database migrations
- Railway backend deployment on push to main
- Vercel frontend deployment on push to main
- OpenAPI documentation auto-regeneration on changes

The workflow will run on every push to main and pull request, ensuring your SaaS application is continuously integrated and deployed with security checks and documentation updates.